<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NainaLabs</title>

<style>
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background: radial-gradient(circle at top, #111, #050505);
  color: white;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
}

nav a {
  color: #aaa;
  text-decoration: none;
  margin-left: 20px;
  transition: 0.3s;
}

nav a:hover {
  color: #c084fc;
}

/* HERO */
.hero {
  height: 80vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

.hero h1 {
  font-size: 3rem;
  letter-spacing: 2px;
  color: #c084fc;
  text-shadow: 0 0 20px rgba(192,132,252,0.4);
}

.hero p {
  color: #888;
  max-width: 400px;
}

/* CARDS */
.section {
  padding: 60px 40px;
  display: flex;
  gap: 20px;
  justify-content: center;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  transition: 0.3s;
  width: 250px;
}

.card:hover {
  transform: translateY(-10px) scale(1.02);
  box-shadow: 0 10px 30px rgba(192,132,252,0.2);
}

/* FOOTER */
footer {
  text-align: center;
  padding: 30px;
  color: #666;
}
</style>

</head>

<body>

<nav>
  <div><strong>NainaLabs</strong></div>
  <div>
    <a href="#">Home</a>
    <a href="#">Research</a>
    <a href="#">Studio</a>
  </div>
</nav>

<section class="hero">
  <h1>NainaLabs</h1>
  <p>thinking, building, becoming</p>
</section>

<section class="section">
  <div class="card">
    <h3>Research</h3>
    <p>Exploring psychology, ideas, and systems.</p>
  </div>

  <div class="card">
    <h3>Studio</h3>
    <p>Poetry, music, and creative expression.</p>
  </div>
</section>

<footer>
  <p>© 2026 NainaLabs</p>
</footer>

</body>
</html>
